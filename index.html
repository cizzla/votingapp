<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meru University Voting System</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

header{
background:#003366;
color:white;
padding:20px;
text-align:center;
}

.container{
width:90%;
max-width:1200px;
margin:auto;
padding:20px;
}

.login-section{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
margin-top:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
width:350px;
}

.card h2{
margin-bottom:15px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#003366;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.candidates{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:30px;
}

.candidate{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
text-align:center;
}

.candidate img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
margin-bottom:10px;
}

.results{
margin-top:40px;
background:white;
padding:20px;
border-radius:10px;
}

.vote-count{
font-weight:bold;
color:green;
}

footer{
margin-top:50px;
padding:20px;
background:#003366;
color:white;
text-align:center;
}
</style>
</head>

<body>

<header>
<h1>MERU UNIVERSITY STUDENT ELECTIONS</h1>
<p>Secure Online Voting Platform</p>
</header>

<div class="container">

<div class="login-section">

<div class="card">
<h2>Student Login</h2>

<input type="text" id="studentReg" placeholder="Registration Number">

<input type="password" id="studentPassword" placeholder="Password">

<button onclick="studentLogin()">
Login
</button>
</div>

<div class="card">
<h2>Admin Login</h2>

<input type="text" id="adminUser" placeholder="Username">

<input type="password" id="adminPass" placeholder="Password">

<button onclick="adminLogin()">
Admin Login
</button>
</div>

</div>

<h2 style="margin-top:40px;">Presidential Candidates</h2>

<div class="candidates">

<div class="candidate">
<img src="https://via.placeholder.com/120">
<h3>Candidate A</h3>
<p>President</p>
<button onclick="vote('Candidate A')">
Vote
</button>
</div>

<div class="candidate">
<img src="https://via.placeholder.com/120">
<h3>Candidate B</h3>
<p>President</p>
<button onclick="vote('Candidate B')">
Vote
</button>
</div>

<div class="candidate">
<img src="https://via.placeholder.com/120">
<h3>Candidate C</h3>
<p>President</p>
<button onclick="vote('Candidate C')">
Vote
</button>
</div>

</div>

<div class="results">

<h2>Election Results</h2>

<p>
Candidate A:
<span class="vote-count" id="A">0</span>
</p>

<p>
Candidate B:
<span class="vote-count" id="B">0</span>
</p>

<p>
Candidate C:
<span class="vote-count" id="C">0</span>
</p>

</div>

</div>

<footer>
© 2026 Meru University Voting System
</footer>

<script>
// Automatically load live results from the server database when page opens
window.onload = function() {
  fetchResults();
};

function fetchResults() {
  fetch("/api/results")
    .then(response => response.json())
    .then(data => {
      document.getElementById("A").innerText = data.A || 0;
      document.getElementById("B").innerText = data.B || 0;
      document.getElementById("C").innerText = data.C || 0;
    })
    .catch(err => console.error("Error fetching live results:", err));
}

function studentLogin() {
  const regNum = document.getElementById("studentReg").value;
  const password = document.getElementById("studentPassword").value;

  fetch("/api/login/student", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ regNum, password })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      alert("Student Login Successful! Welcome " + regNum);
    } else {
      alert("Login failed: " + data.message);
    }
  })
  .catch(err => alert("Error during login connection."));
}

function adminLogin() {
  const username = document.getElementById("adminUser").value;
  const password = document.getElementById("adminPass").value;

  fetch("/api/login/admin", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      alert("Admin Access Granted!");
    } else {
      alert("Admin Access Denied: " + data.message);
    }
  })
  .catch(err => alert("Error during admin connection."));
}

function vote(candidate) {
  fetch("/api/vote", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ candidate })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      alert("Vote submitted successfully to the database.");
      fetchResults(); // Refresh election tallies live
    } else {
      alert("Voting error: " + data.message);
    }
  })
  .catch(err => alert("Error submitting your ballot."));
}
</script>

</body>
</html>
